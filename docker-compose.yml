services:
  db:
    image: postgres:16-alpine
    container_name: tech-challenge-2-db
    environment:
      POSTGRES_DB: tech-challenge-2
      POSTGRES_USER: tech-challenge-2
      POSTGRES_PASSWORD: tech-challenge-2
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tech-challenge-2 -d tech-challenge-2"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tech-challenge-2-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/tech-challenge-2
      DB_USERNAME: tech-challenge-2
      DB_PASSWORD: tech-challenge-2
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
